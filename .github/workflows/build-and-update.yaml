name: build-and-update-overlay

on:
  push:
    branches: [master]
    paths-ignore:
      - 'deploy/kubernetes/overlays/*/kustomization.yaml'

permissions:
  id-token: write
  contents: write

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    # Skip commits made by this workflow to avoid infinite loops.
    if: github.actor != 'github-actions[bot]'

    steps:
    - uses: actions/checkout@v4

    - uses: docker/setup-buildx-action@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: us-west-2

    - name: Log in to ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and push images
      run: ./bin/build --eks

    - name: Generate overlay
      run: ./bin/deploy --eks --no-apply

    - name: Commit updated overlay
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add deploy/kubernetes/overlays/eks/kustomization.yaml
        if git diff --cached --quiet; then
          echo "No overlay changes to commit."
        else
          TAG=$(python3 -c "import json; print(json.load(open('.build-manifest.json'))['tag'])")
          git commit -m "deploy: update eks overlay to ${TAG} [skip ci]"
          git push
        fi

    - name: Configure kubectl
      run: aws eks update-kubeconfig --name tokonoma --region us-west-2

    - name: Deploy to EKS
      run: |
        kubectl apply -k deploy/kubernetes/overlays/eks
        for dep in carts catalogue orders front-end payment user shipping queue-master; do
          kubectl rollout restart deployment/"${dep}" -n sock-shop
        done
        for dep in carts catalogue orders front-end payment user shipping queue-master; do
          echo "Waiting for ${dep}..."
          kubectl rollout status deployment/"${dep}" -n sock-shop --timeout=300s || \
            echo "WARNING: ${dep} did not become ready within 300s"
        done
