server.port=${port:8081}
spring.data.mongodb.uri=mongodb://${db:carts-db}:27017/data?serverSelectionTimeoutMS=10000
management.health.defaults.enabled=false
spring.application.name=carts
# Tracing (Micrometer + Brave + Zipkin) - Boot 2.7
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${zipkin_endpoint:http://${zipkin_host:zipkin}:9411/api/v2/spans}
# Disable Zipkin when not needed (e.g. local run without zipkin)
management.tracing.enabled=${zipkin_enabled:false}
# Actuator / Prometheus
management.endpoints.web.exposure.include=prometheus,health
