---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: carts
  labels:
    name: carts
  namespace: sock-shop
spec:
  replicas: 1
  selector:
    matchLabels:
      name: carts
  template:
    metadata:
      labels:
        name: carts
    spec:
      containers:
      - name: carts
        image: weaveworksdemos/carts:0.4.8
        env:
         - name: JAVA_OPTS
           value: -Xms64m -Xmx128m -XX:+UseG1GC -Djava.security.egd=file:/dev/urandom -Dzipkin_enabled=true -Dzipkin_host=otel-collector-opentelemetry-collector.tokonoma.svc.cluster.local
         # Spring reads these directly; survives images whose ENTRYPOINT ignores JAVA_OPTS
         - name: MANAGEMENT_TRACING_ENABLED
           value: "true"
         - name: MANAGEMENT_ZIPKIN_TRACING_ENDPOINT
           value: "http://otel-collector-opentelemetry-collector.tokonoma.svc.cluster.local:9411/api/v2/spans"
        resources:
          limits:
            cpu: 300m
            memory: 500Mi
          requests:
            cpu: 100m
            memory: 200Mi
        ports:
        - containerPort: 80
        securityContext:
          runAsNonRoot: true
          runAsUser: 10001
          capabilities:
            drop:
              - all
            add:
              - NET_BIND_SERVICE
          readOnlyRootFilesystem: true
        volumeMounts:
        - mountPath: /tmp
          name: tmp-volume
      volumes:
        - name: tmp-volume
          emptyDir:
            medium: Memory
      nodeSelector:
        beta.kubernetes.io/os: linux
