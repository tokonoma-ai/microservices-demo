# Dev overlay: use tag "dev" only for services with locally built images.
# Other services use their original tags from the base manifests.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../manifests

images:
  - name: weaveworksdemos/carts:0.4.8
    newTag: dev
  - name: weaveworksdemos/catalogue:0.3.5
    newTag: dev
  - name: weaveworksdemos/orders:0.4.7
    newTag: dev
